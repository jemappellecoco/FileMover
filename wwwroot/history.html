<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>搬運歷史紀錄</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Noto Sans TC", Arial;
      margin: 32px;
      background: #fafafa;
    }
    h1 { font-size: 22px; margin-bottom: 12px; }
    .toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    button {
      padding: 8px 14px; border: 0; border-radius: 8px;
      background: #111827; color: #fff; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: default; }
    select, input[type="number"] {
      padding: 8px 10px; border-radius: 8px; border:1px solid #d1d5db; background:#fff;
    }
    .muted { color: #6b7280; margin-left: 8px; }
    table {
      width: 100%; border-collapse: collapse; margin-top: 16px; background: #fff;
      table-layout: fixed; word-break: break-all;
    }
    th, td {
      padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 14px; text-align: left; vertical-align: top;
    }
    th { background: #f9fafb; position: sticky; top: 0; z-index: 1; }
    tr:hover td { background: #f3f4f6; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
    td.path { color: #111; }
    .status-pill {
      display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .ok { background:#e6f6ec; color:#146c2e; border:1px solid #b9ebcd; }
    .fail { background:#fdecec; color:#b42318; border:1px solid #f7c6c5; }
  </style>
</head>

<body>
  <h1>🗂️ 搬運歷史紀錄</h1>

  <div class="toolbar">
    <label>狀態：
      <select id="selStatus">
        <option value="all">全部</option>
        <option value="11">搬移成功</option>
        <option value="91">搬移失敗</option>
        <option value="12">刪除成功</option>
        <option value="92">刪除失敗</option>
      </select>
    </label>

    <label>顯示筆數：
      <input id="inpTake" type="number" min="10" step="10" value="200" style="width:100px;">
    </label>

    <button id="btnReload">重新整理</button>
    <button id="btnExport">匯出 CSV</button>
    <span id="rowCount" class="muted"></span>
  </div>

  <table id="histTable">
    <thead>
      <tr>
        <th style="width:90px;">HistoryId</th>
        <th style="width:80px;">FileId</th>
        <th style="width:160px;">節目名稱</th>
        <th style="width:200px;">檔名(UserBit)</th>
        <th>來源（完整檔案路徑）</th>
        <th>目的地（完整檔案路徑）</th>
        <th style="width:90px;">FromId</th>
        <th style="width:90px;">ToId</th>
        <th style="width:165px;">UpdateTime</th>
        <th style="width:90px;">Status</th>
        <th style="width:260px;">Error（失敗時）</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="11" style="text-align:center;color:#999;">載入中…</td></tr>
    </tbody>
  </table>

<script>
  // === 設定你的 API 路徑 ===
  // 期望後端：GET /history?status=all&take=200
  const API_HISTORY = '/history';

  const $selStatus = document.getElementById('selStatus');
  const $inpTake   = document.getElementById('inpTake');
  const $btnReload = document.getElementById('btnReload');
  const $btnExport = document.getElementById('btnExport');
  const $tbody     = document.querySelector('#histTable tbody');
  const $count     = document.getElementById('rowCount');

  // 所有資料（從後端撈一次），與目前顯示的資料
  let allRows = [];
  let currentRows = [];

  function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleString(); // 以本地時間顯示
  }


  // === 前端渲染表格 ===
function render(rows) {
  const frag = document.createDocumentFragment();
  rows.forEach(r => {
    const tr = document.createElement('tr');
    const src = (r.sourcePath || '').replaceAll('\\\\', '\\');
    const dst = (r.destPath || '').replaceAll('\\\\', '\\');
    const err = r.error || '';
    const label = statusLabelFromCode(r.status); // ← 以碼值轉標籤

    tr.innerHTML = `
      <td>${r.historyId ?? ''}</td>
      <td>${r.fileId ?? ''}</td>
      <td>${r.programName || ''}</td>
      <td>${r.fileName || ''}</td>
      <td class="mono path" title="${src}">${src}</td>
      <td class="mono path" title="${dst}">${dst}</td>
      <td>${r.fromStorageId ?? ''}</td>
      <td>${r.toStorageId ?? ''}</td>
      <td>${fmtDate(r.updateTime)}</td>
      <td>${pillByLabel(label)}</td>   <!-- ← 用新膠囊 -->
      <td class="mono" title="${err}">${err.length > 120 ? (err.slice(0,120) + '…') : err}</td>
    `;
    frag.appendChild(tr);
  });
  $tbody.innerHTML = '';
  $tbody.appendChild(frag);
  $count.textContent = rows.length + ' 筆';
  currentRows = rows;
}

function statusLabelFromCode(code) {
  const n = Number(code);
  if (n === 11) return '搬移成功';
  if (n === 91) return '搬移失敗';
  if (n === 12) return '刪除成功';
  if (n === 92) return '刪除失敗';
  if (n === 1)  return '進行中';
  if (n === 0)  return '待處理';
  return String(code ?? '');
}

function pillByLabel(label) {
  if (label === '搬移成功' || label === '刪除成功')
    return `<span class="status-pill ok">${label}</span>`;
  if (label === '搬移失敗' || label === '刪除失敗')
    return `<span class="status-pill fail">${label}</span>`;
  return `<span class="status-pill">${label}</span>`;
}
  // === 根據下拉選單過濾 ===
function filterAndRender() {
  const st = $selStatus.value || 'all';
  let rows = allRows;
  if (st !== 'all') {
    const want = Number(st);
    rows = allRows.filter(r => Number(r.status) === want);
  }
  render(rows);
}

  // === 從後端載入資料 ===
  async function loadHistory() {
    $btnReload.disabled = true;
    $btnReload.textContent = '載入中…';
    $count.textContent = '';
    $tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;color:#999;">載入中…</td></tr>`;

    const take = Math.max(1, parseInt($inpTake.value || '200', 10));

    try {
      const url = `${API_HISTORY}?status=all&take=${take}&ts=${Date.now()}`;
      const resp = await fetch(url, { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const rows = await resp.json();
      allRows = Array.isArray(rows) ? rows : [];

      if (allRows.length === 0) {
        $tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;color:#999;">（沒有符合條件的紀錄）</td></tr>`;
        $count.textContent = '0 筆';
        return;
      }
      filterAndRender(); // 依當前狀態顯示
    } catch (err) {
      console.error(err);
      $tbody.innerHTML = `<tr><td colspan="11" style="color:#c00;">載入失敗：${err.message}</td></tr>`;
    } finally {
      $btnReload.disabled = false;
      $btnReload.textContent = '重新整理';
    }
  }

  // === 匯出 CSV ===
  function exportCSV() {
  if (!currentRows || currentRows.length === 0) return;

  const header = [
    'HistoryId','FileId','ProgramName','FileName',
    'SourcePath','DestPath','FromStorageId','ToStorageId',
    'UpdateTime','Status','Error'
  ];
  const lines = [header.join(',')];

  for (const r of currentRows) {
    const label = statusLabelFromCode(r.status);  // 🟢 新增：依碼值取標籤
    const row = [
      r.historyId ?? '',
      r.fileId ?? '',
      safeCSV(r.programName),
      safeCSV(r.fileName),
      safeCSV((r.sourcePath || '').replaceAll('\\\\','\\')),
      safeCSV((r.destPath || '').replaceAll('\\\\','\\')),
      r.fromStorageId ?? '',
      r.toStorageId ?? '',
      fmtDate(r.updateTime),
      label,                                       // 🟢 改成中文標籤
      safeCSV(r.error || '')
    ];
    lines.push(row.join(','));
  }

  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `history_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  function safeCSV(s) {
    if (s == null) return '';
    const t = String(s).replaceAll('"', '""');
    return /[",\n]/.test(t) ? `"${t}"` : t;
  }
}
  // === 綁定事件 ===
  $btnReload.addEventListener('click', loadHistory);
  $btnExport.addEventListener('click', exportCSV);
  $selStatus.addEventListener('change', filterAndRender);
  $inpTake.addEventListener('change', loadHistory);

  // === 初次載入 ===
  loadHistory();
</script>

</body>
</html>
